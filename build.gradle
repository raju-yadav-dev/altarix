plugins {
    id 'java'
    id 'application'
}

defaultTasks 'run'

repositories {
    mavenCentral()
}

java {
    sourceCompatibility = JavaVersion.VERSION_17
    targetCompatibility = JavaVersion.VERSION_17
}

def currentOs = org.gradle.internal.os.OperatingSystem.current()
def javafxPlatform = (findProperty('javafxPlatform')
    ?: (currentOs.windows ? 'win' : currentOs.macOsX ? 'mac' : 'linux')).toString()

application {
    mainClass = 'com.example.chatbot.CortexLauncher'
}

dependencies {
    implementation "org.openjfx:javafx-base:20.0.1:${javafxPlatform}"
    implementation "org.openjfx:javafx-graphics:20.0.1:${javafxPlatform}"
    implementation "org.openjfx:javafx-controls:20.0.1:${javafxPlatform}"
    implementation "org.openjfx:javafx-fxml:20.0.1:${javafxPlatform}"
    implementation "org.openjfx:javafx-web:20.0.1:${javafxPlatform}"
    implementation "org.openjfx:javafx-media:20.0.1:${javafxPlatform}"

    implementation 'org.apache.pdfbox:pdfbox:2.0.29'
    implementation 'org.apache.poi:poi-ooxml:5.2.5'
    implementation 'com.google.code.gson:gson:2.10.1'

    testImplementation 'org.junit.jupiter:junit-jupiter-api:5.9.2'
    testRuntimeOnly 'org.junit.jupiter:junit-jupiter-engine:5.9.2'
}

run {
    jvmArgs = [
        '--module-path', configurations.runtimeClasspath.asPath,
        '--add-modules', 'javafx.base,javafx.graphics,javafx.controls,javafx.fxml,javafx.web,javafx.media'
    ]
}

tasks.withType(JavaCompile).configureEach {
    options.encoding = 'UTF-8'
}


test {
    useJUnitPlatform()
}

jar {
    archiveBaseName = 'Cortex'
    manifest {
        attributes(
            'Main-Class': 'com.example.chatbot.CortexLauncher',
            'Implementation-Version': archiveVersion
        )
    }
    duplicatesStrategy = 'exclude'
    from {
        configurations.runtimeClasspath.collect { it.isDirectory() ? it : zipTree(it) }
    }
}

def appName = 'Cortex'
def appVersion = '1.2.1'
def vendorName = 'Cortex AI'
def isWindows = currentOs.windows
def installerOutputDir = layout.buildDirectory.dir('installers')
def iconFile = file('src/main/resources/icon/Cortex.ico')
def jarTask = tasks.named('jar', Jar)

def jpackageExecutable = providers.provider {
    def binaryName = isWindows ? 'jpackage.exe' : 'jpackage'
    new File(System.getProperty('java.home'), "bin/${binaryName}").absolutePath
}

def windowsInstallerArgs = { String installerType ->
    [
        '--name', appName,
        '--input', layout.buildDirectory.dir('libs').get().asFile.absolutePath,
        '--main-jar', jarTask.get().archiveFileName.get(),
        '--type', installerType,
        '--dest', installerOutputDir.get().asFile.absolutePath,
        '--app-version', appVersion,
        '--vendor', vendorName,
        '--icon', iconFile.absolutePath,
        '--win-menu',
        '--win-shortcut',
        '--win-menu-group', appName
    ]
}

tasks.register('packageExe', Exec) {
    group = 'distribution'
    description = 'Builds a Windows .exe installer for Cortex.'
    dependsOn jarTask
    onlyIf { isWindows }

    doFirst {
        installerOutputDir.get().asFile.mkdirs()
        executable = jpackageExecutable.get()
        args windowsInstallerArgs('exe')
    }
}

tasks.register('packageMsi', Exec) {
    group = 'distribution'
    description = 'Builds a Windows .msi installer for Cortex.'
    dependsOn jarTask
    onlyIf { isWindows }

    doFirst {
        installerOutputDir.get().asFile.mkdirs()
        executable = jpackageExecutable.get()
        args windowsInstallerArgs('msi')
    }
}

tasks.register('packageInstallers') {
    group = 'distribution'
    description = 'Builds both Windows installers for Cortex.'
    dependsOn 'packageExe', 'packageMsi'
}
