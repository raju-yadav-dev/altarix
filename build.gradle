plugins {
    id 'java'
    id 'application'
}

defaultTasks 'run'

def targetJavaVersion = 25

repositories {
    mavenCentral()
}

java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(targetJavaVersion)
    }
}

def currentOs = org.gradle.internal.os.OperatingSystem.current()
def javafxPlatform = (findProperty('javafxPlatform')
    ?: (currentOs.windows ? 'win' : currentOs.macOsX ? 'mac' : 'linux')).toString()
def java25Launcher = javaToolchains.launcherFor {
    languageVersion = JavaLanguageVersion.of(targetJavaVersion)
}
def java25Metadata = javaToolchains.launcherFor {
    languageVersion = JavaLanguageVersion.of(targetJavaVersion)
}.map { it.metadata }

application {
    mainClass = 'com.example.chatbot.AltarixLauncher'
    applicationDefaultJvmArgs = [
        '--enable-native-access=javafx.graphics,javafx.web'
    ]
}

dependencies {
    implementation "org.openjfx:javafx-base:20.0.1:${javafxPlatform}"
    implementation "org.openjfx:javafx-graphics:20.0.1:${javafxPlatform}"
    implementation "org.openjfx:javafx-controls:20.0.1:${javafxPlatform}"
    implementation "org.openjfx:javafx-fxml:20.0.1:${javafxPlatform}"
    implementation "org.openjfx:javafx-web:20.0.1:${javafxPlatform}"
    implementation "org.openjfx:javafx-media:20.0.1:${javafxPlatform}"

    implementation 'org.apache.pdfbox:pdfbox:2.0.29'
    implementation 'org.apache.poi:poi-ooxml:5.2.5'
    implementation 'com.google.code.gson:gson:2.10.1'

    testImplementation 'org.junit.jupiter:junit-jupiter-api:5.9.2'
    testRuntimeOnly 'org.junit.jupiter:junit-jupiter-engine:5.9.2'
}

run {
    jvmArgs = [
        '--module-path', configurations.runtimeClasspath.asPath,
        '--add-modules', 'javafx.base,javafx.graphics,javafx.controls,javafx.fxml,javafx.web,javafx.media',
        '--enable-native-access=javafx.graphics,javafx.web'
    ]
}

tasks.withType(JavaCompile).configureEach {
    options.encoding = 'UTF-8'
    options.release = targetJavaVersion
}

tasks.withType(JavaExec).configureEach {
    javaLauncher = java25Launcher
}

tasks.withType(Test).configureEach {
    javaLauncher = java25Launcher
}

tasks.withType(Javadoc).configureEach {
    javadocTool = javaToolchains.javadocToolFor {
        languageVersion = JavaLanguageVersion.of(targetJavaVersion)
    }
}


test {
    useJUnitPlatform()
}

jar {
    archiveBaseName = 'Altarix'
    manifest {
        attributes(
            'Main-Class': 'com.example.chatbot.AltarixLauncher'
        )
    }
    duplicatesStrategy = 'exclude'
    from {
        configurations.runtimeClasspath.collect { it.isDirectory() ? it : zipTree(it) }
    }
}

def appName = 'Altarix'
ext {
    versionProps = new Properties()
    file('version.properties').withInputStream { stream -> versionProps.load(stream) }
    appVersion = versionProps['version']
}
afterEvaluate {
    jar.manifest.attributes['Implementation-Version'] = appVersion
}

def vendorName = 'Altarix AI'
def isWindows = currentOs.windows
def isLinux = currentOs.linux
def isMac = currentOs.macOsX
def installerOutputDir = layout.buildDirectory.dir('installers')
def windowsIconFile = file('src/main/resources/icon/Altarix-1024.ico')
def linuxIconFile = file('src/main/resources/icon/Altarix-1024.png')
def macIconFile = file('src/main/resources/icon/Altarix.icns')
def jarTask = tasks.named('jar', Jar)

def jpackageExecutable = providers.provider {
    def binaryName = isWindows ? 'jpackage.exe' : 'jpackage'
    new File(java25Metadata.get().installationPath.asFile, "bin/${binaryName}").absolutePath
}

def windowsInstallerArgs = { String installerType ->
    [
        '--name', appName,
        '--input', layout.buildDirectory.dir('libs').get().asFile.absolutePath,
        '--main-jar', jarTask.get().archiveFileName.get(),
        '--type', installerType,
        '--dest', installerOutputDir.get().asFile.absolutePath,
        '--app-version', appVersion,
        '--vendor', vendorName,
        '--java-options', '--enable-native-access=javafx.graphics,javafx.web',
        '--icon', windowsIconFile.absolutePath,
        '--win-menu',
        '--win-shortcut',
        '--win-menu-group', appName
    ]
}

def linuxInstallerArgs = { String installerType ->
    [
        '--name', appName,
        '--input', layout.buildDirectory.dir('libs').get().asFile.absolutePath,
        '--main-jar', jarTask.get().archiveFileName.get(),
        '--type', installerType,
        '--dest', installerOutputDir.get().asFile.absolutePath,
        '--app-version', appVersion,
        '--vendor', vendorName,
        '--java-options', '--enable-native-access=javafx.graphics,javafx.web',
        '--icon', linuxIconFile.absolutePath,
        '--linux-shortcut'
    ]
}

def macInstallerArgs = { String installerType ->
    def args = [
        '--name', appName,
        '--input', layout.buildDirectory.dir('libs').get().asFile.absolutePath,
        '--main-jar', jarTask.get().archiveFileName.get(),
        '--type', installerType,
        '--dest', installerOutputDir.get().asFile.absolutePath,
        '--app-version', appVersion,
        '--vendor', vendorName,
        '--java-options', '--enable-native-access=javafx.graphics,javafx.web'
    ]
    if (macIconFile.exists()) {
        args += ['--icon', macIconFile.absolutePath]
    }
    return args
}

tasks.register('packageExe', Exec) {
    group = 'distribution'
    description = 'Builds a Windows .exe installer for Altarix.'
    dependsOn jarTask
    onlyIf { isWindows }

    doFirst {
        installerOutputDir.get().asFile.mkdirs()
        executable = jpackageExecutable.get()
        args windowsInstallerArgs('exe')
    }
}

tasks.register('packageDeb', Exec) {
    group = 'distribution'
    description = 'Builds a Linux .deb installer for Altarix.'
    dependsOn jarTask
    onlyIf { isLinux }

    doFirst {
        installerOutputDir.get().asFile.mkdirs()
        executable = jpackageExecutable.get()
        args linuxInstallerArgs('deb')
    }
}

tasks.register('packageDmg', Exec) {
    group = 'distribution'
    description = 'Builds a macOS .dmg installer for Altarix.'
    dependsOn jarTask
    onlyIf { isMac }

    doFirst {
        installerOutputDir.get().asFile.mkdirs()
        executable = jpackageExecutable.get()
        args macInstallerArgs('dmg')
    }
}

tasks.register('packageMsi', Exec) {
    group = 'distribution'
    description = 'Builds a Windows .msi installer for Altarix.'
    dependsOn jarTask
    onlyIf { isWindows }

    doFirst {
        installerOutputDir.get().asFile.mkdirs()
        executable = jpackageExecutable.get()
        args windowsInstallerArgs('msi')
    }
}

tasks.register('packageInstallers') {
    group = 'distribution'
    description = 'Builds both Windows installers for Altarix.'
    dependsOn 'packageExe', 'packageMsi', 'packageDeb', 'packageDmg'
}

