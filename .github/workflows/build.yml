name: Build Cortex Installers

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact_name: cortex-windows
            javafx_platform: win
          - os: ubuntu-latest
            artifact_name: cortex-linux
            javafx_platform: linux
          - os: macos-latest
            artifact_name: cortex-macos
            javafx_platform: mac

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Install Linux packaging tools
        if: runner.os == 'Linux'
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y fakeroot rpm

      - name: Make Gradle wrapper executable
        if: runner.os != 'Windows'
        shell: bash
        run: chmod +x ./gradlew

      - name: Build platform-specific JAR
        shell: pwsh
        run: |
          if ("${{ runner.os }}" -eq "Windows") {
            .\gradlew.bat --no-daemon clean jar "-PjavafxPlatform=${{ matrix.javafx_platform }}"
          } else {
            ./gradlew --no-daemon clean jar "-PjavafxPlatform=${{ matrix.javafx_platform }}"
          }

      - name: Resolve JAR name
        id: jar
        shell: pwsh
        run: |
          $jar = Get-ChildItem "build/libs/*.jar" | Sort-Object LastWriteTime -Descending | Select-Object -First 1
          if (-not $jar) {
            throw "No JAR was generated in build/libs"
          }
          "jar_name=$($jar.Name)" >> $env:GITHUB_OUTPUT

      - name: Build native packages
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null

          $commonArgs = @(
            '--name', 'Cortex',
            '--input', 'build/libs',
            '--main-jar', '${{ steps.jar.outputs.jar_name }}',
            '--main-class', 'com.example.chatbot.CortexLauncher',
            '--app-version', '1.2.1',
            '--vendor', 'Cortex AI',
            '--dest', 'dist'
          )

          function Invoke-JPackage([string[]] $Args) {
            & jpackage @Args
            if ($LASTEXITCODE -ne 0) {
              throw "jpackage failed with exit code $LASTEXITCODE"
            }
          }

          switch ("${{ runner.os }}") {
            'Windows' {
              foreach ($type in @('exe', 'msi')) {
                $args = $commonArgs + @(
                  '--type', $type,
                  '--icon', 'src/main/resources/icon/Cortex.ico',
                  '--win-shortcut',
                  '--win-menu',
                  '--win-menu-group', 'Cortex'
                )
                Invoke-JPackage $args
              }
            }
            'Linux' {
              foreach ($type in @('deb', 'rpm')) {
                $args = $commonArgs + @(
                  '--type', $type,
                  '--icon', 'src/main/resources/icon/Cortex.png',
                  '--linux-shortcut'
                )
                Invoke-JPackage $args
              }
            }
            'macOS' {
              foreach ($type in @('dmg', 'pkg')) {
                $args = $commonArgs + @(
                  '--type', $type
                )
                Invoke-JPackage $args
              }
            }
            default {
              throw "Unsupported runner OS: ${{ runner.os }}"
            }
          }

      - name: Upload packaged artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/*
          if-no-files-found: error
