name: Build Release Artifacts

on:
  workflow_dispatch:
  release:
    types:
      - published
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: write

jobs:
  windows-artifacts:
    name: Windows (.exe, .msi)
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "25"

      - name: Build Windows installers
        shell: pwsh
        run: |
          ./gradlew.bat clean jar packageExe packageMsi --stacktrace

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: altarix-windows-installers
          path: |
            build/installers/*.exe
            build/installers/*.msi
          if-no-files-found: error

  linux-artifacts:
    name: Linux (.deb, .rpm, .tar.gz)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux packaging dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y rpm fakeroot

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "25"
          cache: gradle

      - name: Build Linux .deb
        run: ./gradlew clean jar packageDeb --stacktrace

      - name: Build Linux .rpm with jpackage
        shell: bash
        run: |
          APP_VERSION="$(grep '^version=' version.properties | cut -d'=' -f2)"
          JAR_NAME="$(ls build/libs/*.jar | head -n 1 | xargs -n 1 basename)"
          jpackage \
            --name Altarix \
            --input build/libs \
            --main-jar "${JAR_NAME}" \
            --type rpm \
            --dest build/installers \
            --app-version "${APP_VERSION}" \
            --vendor "Altarix AI" \
            --java-options "--enable-native-access=javafx.graphics,javafx.web" \
            --icon src/main/resources/icon/Altarix-1024.png \
            --linux-shortcut

      - name: Build Linux .tar.gz
        shell: bash
        run: |
          APP_VERSION="$(grep '^version=' version.properties | cut -d'=' -f2)"
          JAR_NAME="$(ls build/libs/*.jar | head -n 1 | xargs -n 1 basename)"
          jpackage \
            --name Altarix \
            --input build/libs \
            --main-jar "${JAR_NAME}" \
            --type app-image \
            --dest build/installers \
            --app-version "${APP_VERSION}" \
            --vendor "Altarix AI" \
            --java-options "--enable-native-access=javafx.graphics,javafx.web" \
            --icon src/main/resources/icon/Altarix-1024.png
          tar -C build/installers -czf "build/installers/Altarix-${APP_VERSION}-linux.tar.gz" Altarix

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: altarix-linux-packages
          path: |
            build/installers/*.deb
            build/installers/*.rpm
            build/installers/*.tar.gz
          if-no-files-found: error

  macos-artifacts:
    name: macOS (.deb, .rpm)
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "25"
          cache: gradle

      - name: Install fpm for package generation
        shell: bash
        run: |
          set -euo pipefail
          brew update
          brew install ruby rpm
          gem install --user-install --no-document fpm
          echo "$(ruby -e 'print Gem.user_dir')/bin" >> "$GITHUB_PATH"

      - name: Build app image for packaging
        shell: bash
        run: |
          set -euo pipefail
          ./gradlew clean jar --stacktrace
          APP_VERSION="$(grep '^version=' version.properties | cut -d'=' -f2)"
          JAR_NAME="$(ls build/libs/*.jar | head -n 1 | xargs -n 1 basename)"
          mkdir -p build/installers
          jpackage \
            --name Altarix \
            --input build/libs \
            --main-jar "${JAR_NAME}" \
            --type app-image \
            --dest build/installers \
            --app-version "${APP_VERSION}" \
            --vendor "Altarix AI" \
            --java-options "--enable-native-access=javafx.graphics,javafx.web"

      - name: Build macOS-labeled .deb and .rpm artifacts
        shell: bash
        run: |
          set -euo pipefail
          APP_VERSION="$(grep '^version=' version.properties | cut -d'=' -f2)"
          APP_IMAGE_PATH="$(ls -d build/installers/*.app | head -n 1)"
          mkdir -p build/macos-package-root/opt/altarix
          cp -R "${APP_IMAGE_PATH}" build/macos-package-root/opt/altarix/
          fpm -s dir -t deb -n altarix-macos -v "${APP_VERSION}" -C build/macos-package-root .
          fpm -s dir -t rpm -n altarix-macos -v "${APP_VERSION}" -C build/macos-package-root .
          mkdir -p build/installers
          mv -f ./*.deb ./*.rpm build/installers/

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: altarix-macos-packages
          path: |
            build/installers/*.deb
            build/installers/*.rpm
          if-no-files-found: error

  publish-release-assets:
    name: Publish GitHub Release Assets
    if: github.event_name == 'release' || github.event_name == 'push'
    needs:
      - windows-artifacts
      - linux-artifacts
      - macos-artifacts
    runs-on: ubuntu-latest
    outputs:
      release_tag: ${{ steps.release_meta.outputs.release_tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compute release metadata
        id: release_meta
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${{ github.event_name }}" == "release" ]]; then
            echo "release_tag=${{ github.event.release.tag_name }}" >> "$GITHUB_OUTPUT"
            echo "release_name=${{ github.event.release.name }}" >> "$GITHUB_OUTPUT"
          else
            VERSION="$(grep '^version=' version.properties | cut -d'=' -f2)"
            TAG="v${VERSION}"
            echo "release_tag=${TAG}" >> "$GITHUB_OUTPUT"
            echo "release_name=Altarix ${TAG}" >> "$GITHUB_OUTPUT"
          fi

      - name: Download all built artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Upload artifacts to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_meta.outputs.release_tag }}
          name: ${{ steps.release_meta.outputs.release_name }}
          generate_release_notes: true
          append_body: true
          draft: false
          prerelease: false
          make_latest: true
          fail_on_unmatched_files: true
          target_commitish: ${{ github.sha }}
          token: ${{ secrets.GITHUB_TOKEN }}
          preserve_order: true
          overwrite_files: true
          files: |
            release-assets/**/*.exe
            release-assets/**/*.msi
            release-assets/**/*.deb
            release-assets/**/*.rpm
            release-assets/**/*.tar.gz

  sync-release-assets-to-supabase:
    name: Sync Release Assets To Supabase
    if: github.event_name == 'release' || github.event_name == 'push'
    needs:
      - publish-release-assets
    runs-on: ubuntu-latest

    steps:
      - name: Insert release asset metadata into Supabase
        env:
          GH_TOKEN: ${{ github.token }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_TABLE: app_updates
          RELEASE_TAG: ${{ needs.publish-release-assets.outputs.release_tag }}
          REPOSITORY: ${{ github.repository }}
        shell: bash
        run: |
          set -euo pipefail

          if [[ -z "${SUPABASE_URL:-}" || -z "${SUPABASE_SERVICE_ROLE_KEY:-}" || -z "${SUPABASE_TABLE:-}" ]]; then
            echo "Supabase secrets are missing. Required: SUPABASE_URL, SUPABASE_SERVICE_ROLE_KEY"
            exit 1
          fi

          RELEASE_JSON="$(gh api "repos/${REPOSITORY}/releases/tags/${RELEASE_TAG}")"
          ASSETS_JSON="$(echo "$RELEASE_JSON" | jq '.assets')"
          RELEASE_NOTES="$(echo "$RELEASE_JSON" | jq -r '.body // .name // ""')"
          ASSETS_COUNT="$(echo "$ASSETS_JSON" | jq 'length')"

          if [[ "$ASSETS_COUNT" -eq 0 ]]; then
            echo "No release assets found to sync."
            exit 0
          fi

          PAYLOAD="$(echo "$ASSETS_JSON" | jq -c --arg tag "$RELEASE_TAG" --arg notes "${RELEASE_NOTES}" '
            map({
              version: ($tag | sub("^v"; "")),
              download_url: .browser_download_url,
              release_notes: ($notes // ""),
              is_mandatory: false,
              type: (if (.name | ascii_downcase | endswith(".tar.gz")) then "tar.gz" else (.name | split(".")[-1] | ascii_downcase) end)
            } | select(.type == "exe" or .type == "msi" or .type == "deb" or .type == "rpm" or .type == "tar.gz"))
          ')"

          curl --fail-with-body -sS \
            -X POST "${SUPABASE_URL}/rest/v1/${SUPABASE_TABLE}" \
            -H "apikey: ${SUPABASE_SERVICE_ROLE_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_SERVICE_ROLE_KEY}" \
            -H "Content-Type: application/json" \
            -H "Prefer: return=minimal" \
            -d "$PAYLOAD"

